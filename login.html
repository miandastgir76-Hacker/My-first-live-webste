<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porsche Dealer - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --red: #E30613;
            --dark: #0a0a0a;
            --surface: #111;
            --surface2: #1a1a1a;
            --text: #f0f0f0;
            --muted: #888;
            --accent: #E30613;
        }

        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* BACKGROUND */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(227, 6, 19, 0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(227, 6, 19, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.6;
            pointer-events: none;
            z-index: 1;
        }

        .bg-gradient {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 50%, #1a0505 0%, #0a0a0a 60%, #000 100%);
            pointer-events: none;
            z-index: 0;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--red), transparent);
            animation: scan 4s linear infinite;
            opacity: 0.5;
            z-index: 2;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: -2px; }
            100% { top: 100%; }
        }

        /* CONTAINER */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 2rem;
        }

        /* HEADER */
        .login-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #fff;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeInDown 0.8s 0.3s forwards;
        }

        .logo span {
            color: var(--red);
        }

        .login-subtitle {
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: var(--red);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeInDown 0.8s 0.4s forwards;
        }

        .login-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text);
            opacity: 0;
            animation: fadeInDown 0.8s 0.5s forwards;
        }

        /* FORM */
        .login-form {
            background: linear-gradient(135deg, rgba(17, 17, 17, 0.95) 0%, rgba(26, 26, 26, 0.95) 100%);
            border: 1px solid rgba(227, 6, 19, 0.3);
            border-radius: 8px;
            padding: 2.5rem;
            opacity: 0;
            animation: fadeInUp 0.8s 0.6s forwards;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(227, 6, 19, 0.1);
        }

        .form-group {
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
        }

        .form-group:nth-child(1) {
            animation-delay: 0.7s;
        }

        .form-group:nth-child(2) {
            animation-delay: 0.8s;
        }

        .form-group:nth-child(3) {
            animation-delay: 0.9s;
        }

        .form-group:nth-child(4) {
            animation-delay: 1s;
        }

        label {
            display: block;
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            transition: color 0.3s;
        }

        input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(227, 6, 19, 0.2);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--red);
            box-shadow: 0 0 20px rgba(227, 6, 19, 0.3);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group:focus-within label {
            color: var(--red);
        }

        /* REMEMBER & FORGOT */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.85rem;
            opacity: 0;
            animation: fadeInUp 0.8s 1.1s forwards;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--red);
        }

        .forgot-password {
            color: var(--red);
            text-decoration: none;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .forgot-password:hover {
            color: #fff;
            text-decoration: underline;
        }

        /* BUTTON */
        .login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--red);
            color: #fff;
            border: 2px solid var(--red);
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0;
            animation: fadeInUp 0.8s 1.2s forwards;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: -1;
            transition: left 0.3s;
        }

        .login-btn:hover {
            left: 0;
            background: transparent;
            color: var(--red);
        }

        .login-btn:hover::before {
            left: 0;
        }

        /* SIGNUP LINK */
        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--muted);
            opacity: 0;
            animation: fadeInUp 0.8s 1.3s forwards;
        }

        .signup-link a {
            color: var(--red);
            text-decoration: none;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .signup-link a:hover {
            color: #fff;
            text-decoration: underline;
        }

        /* DECORATIVE ELEMENTS */
        .corner-accent {
            position: fixed;
            width: 100px;
            height: 100px;
            border: 2px solid var(--red);
            opacity: 0.2;
            pointer-events: none;
        }

        .corner-top-left {
            top: 0;
            left: 0;
            border-right: none;
            border-bottom: none;
            border-radius: 0 0 20px 0;
            opacity: 0;
            animation: fadeIn 0.8s 0.5s forwards;
        }

        .corner-bottom-right {
            bottom: 0;
            right: 0;
            border-left: none;
            border-top: none;
            border-radius: 20px 0 0 0;
            opacity: 0;
            animation: fadeIn 0.8s 0.7s forwards;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 0.2;
            }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .login-container {
                max-width: 100%;
                padding: 1.5rem;
            }

            .login-form {
                padding: 2rem;
            }

            .logo {
                font-size: 1.8rem;
            }

            .login-title {
                font-size: 1.3rem;
            }

            .corner-accent {
                width: 60px;
                height: 60px;
            }
        }

        /* ERROR MESSAGE */
        .error-message {
            background: rgba(227, 6, 19, 0.2);
            border-left: 3px solid var(--red);
            color: #ff9999;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
            display: none;
            opacity: 0;
            animation: slideIn 0.3s ease forwards;
        }

        .error-message.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
    <div class="scan-line"></div>
    <div class="corner-accent corner-top-left"></div>
    <div class="corner-accent corner-bottom-right"></div>

    <div class="login-container">
        <div class="login-header">
            <div class="logo">PORSCHE <span>911</span></div>
            <div class="login-subtitle">Dealer Network</div>
            <h1 class="login-title">Secure Access</h1>
        </div>

        <form class="login-form" onsubmit="handleLogin(event)">
            <div class="error-message" id="errorMessage"></div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="dealer@porsche.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="dealership">Dealership Code</label>
                <input type="text" id="dealership" name="dealership" placeholder="e.g., PS-2024" required>
            </div>

            <div class="form-group">
                <label for="code">Verification Code</label>
                <input type="text" id="code" name="code" placeholder="6-digit code" required>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="signup-link">
            Don't have access? <a href="#">Request Dealer Account</a> • <a href="porsche_911_gt3_showcase.html" style="color:var(--red)">Back to Home</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api';

        function handleLogin(event) {
            event.preventDefault();
            
            const loginBtn = event.target.querySelector('.login-btn');
            const originalText = loginBtn.textContent;
            loginBtn.disabled = true;
            loginBtn.textContent = 'LOGGING IN...';

            const credentials = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                dealership_code: document.getElementById('dealership').value,
                verification_code: document.getElementById('code').value
            };

            // Call Django backend API
            fetch(`${API_BASE_URL}/auth/login/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                credentials: 'include',
                body: JSON.stringify(credentials)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Store user info
                    localStorage.setItem('user', JSON.stringify(data.user));
                    // Redirect to dashboard
                    window.location.href = 'system-dashboard.html';
                } else {
                    showError(data.errors || 'Login failed');
                    loginBtn.disabled = false;
                    loginBtn.textContent = originalText;
                }
            })
            .catch(error => {
                console.error('Login error:', error);
                showError('Connection error. Make sure Django server is running on http://localhost:8000');
                loginBtn.disabled = false;
                loginBtn.textContent = originalText;
            });
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function showError(error) {
            let message = 'Login failed';
            
            if (typeof error === 'object') {
                // Extract first error message from object
                for (let key in error) {
                    if (Array.isArray(error[key])) {
                        message = error[key][0];
                    } else {
                        message = error[key];
                    }
                    break;
                }
            } else if (typeof error === 'string') {
                message = error;
            }

            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        // Check if user is already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const user = localStorage.getItem('user');
            if (user) {
                // Optional: redirect to dashboard if already logged in
                // window.location.href = 'system-dashboard.html';
            }
        });
    </script>
</body>
</html>
